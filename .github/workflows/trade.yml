name: Perps Trading Agent

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Jupiter CLI v0.6.0
        run: npm install -g @jup-ag/cli@0.6.0

      - name: Setup wallet key
        env:
          JUP_PRIVATE_KEY: ${{ secrets.JUP_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.config/jup/keys
          node -e "
            const key = process.env.JUP_PRIVATE_KEY.trim();
            const fs = require('fs');
            const home = process.env.HOME;
            fs.writeFileSync(home + '/.config/jup/keys/default.json', key);
            fs.writeFileSync(home + '/.config/jup/settings.json', JSON.stringify({ activeKey: 'default' }));
            console.log('Key ready');
          "
          # Skip jup keys list (causes keychain error on Linux)
          # Verify file exists instead
          test -f ~/.config/jup/keys/default.json && echo "Key file verified ✅" || echo "Key file missing ❌"

      - name: Run trading agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COLLATERAL_USDC: ${{ vars.COLLATERAL_USDC }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: npm run trade
