name: Perps Trading Agent

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Jupiter CLI
        run: npm install -g @jup-ag/cli

      - name: Check jup version
        run: jup --version

      - name: Setup wallet key
        env:
          JUP_PRIVATE_KEY: ${{ secrets.JUP_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.config/jup/keys

          # Convert array bytes format to Uint8Array and save as JSON
          node -e "
            const keyStr = process.env.JUP_PRIVATE_KEY.trim();
            // Handle both formats: array [1,2,3] or base58 string
            let keyData;
            if (keyStr.startsWith('[')) {
              // Array bytes format
              keyData = JSON.parse(keyStr);
            } else {
              // Already JSON or other format
              keyData = JSON.parse(keyStr);
            }
            // Save as JSON array (what jup expects)
            require('fs').writeFileSync(
              process.env.HOME + '/.config/jup/keys/default',
              JSON.stringify(keyData)
            );
            console.log('Key saved, length:', keyData.length);
          "

          # Set active key config
          echo '{"activeKey":"default"}' > ~/.config/jup/config.json

      - name: Verify wallet
        run: jup keys list

      - name: Run trading agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COLLATERAL_USDC: ${{ vars.COLLATERAL_USDC }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: npm run trade
