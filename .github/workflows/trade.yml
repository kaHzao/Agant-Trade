name: Perps Trading Agent

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Jupiter CLI
        run: npm install -g @jup-ag/cli

      - name: Check jup version
        run: jup --version

      - name: Setup wallet key
        env:
          JUP_PRIVATE_KEY: ${{ secrets.JUP_PRIVATE_KEY }}
        run: |
          # Create jup config directory
          mkdir -p ~/.config/jup/keys
          # Write key file directly (array bytes format)
          echo "$JUP_PRIVATE_KEY" > ~/.config/jup/keys/default
          # Set as active key
          mkdir -p ~/.config/jup
          echo '{"activeKey":"default"}' > ~/.config/jup/config.json

      - name: Verify wallet
        run: jup keys list

      - name: Run trading agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COLLATERAL_USDC: ${{ vars.COLLATERAL_USDC }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: npm run trade
