name: Perps Trading Agent

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Jupiter CLI
        run: npm install -g @jup-ag/cli

      - name: Setup wallet key
        env:
          JUP_PRIVATE_KEY: ${{ secrets.JUP_PRIVATE_KEY }}
        run: |
          # Convert array bytes to base58 using pure Node.js (no external lib)
          BASE58_KEY=$(node -e "
            const ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
            function encodeBase58(buf) {
              let digits = [0];
              for (let i = 0; i < buf.length; i++) {
                let carry = buf[i];
                for (let j = 0; j < digits.length; j++) {
                  carry += digits[j] << 8;
                  digits[j] = carry % 58;
                  carry = (carry / 58) | 0;
                }
                while (carry > 0) { digits.push(carry % 58); carry = (carry / 58) | 0; }
              }
              let result = '';
              for (let i = buf.length - 1; i >= 0 && buf[i] === 0; i--) result += '1';
              for (let i = digits.length - 1; i >= 0; i--) result += ALPHABET[digits[i]];
              return result;
            }
            const keyData = JSON.parse(process.env.JUP_PRIVATE_KEY.trim());
            process.stdout.write(encodeBase58(Buffer.from(keyData)));
          ")
          echo "Base58 key generated, length: ${#BASE58_KEY}"
          echo "$BASE58_KEY" | jup keys add default --stdin
          jup keys list

      - name: Run trading agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COLLATERAL_USDC: ${{ vars.COLLATERAL_USDC }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: npm run trade
