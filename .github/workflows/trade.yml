name: Perps Trading Agent

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Jupiter CLI and bs58
        run: |
          npm install -g @jup-ag/cli
          npm install -g bs58

      - name: Setup wallet key
        env:
          JUP_PRIVATE_KEY: ${{ secrets.JUP_PRIVATE_KEY }}
        run: |
          # Convert array bytes → base58 → pipe to jup keys add
          BASE58_KEY=$(node -e "
            const bs58 = require('bs58');
            const keyData = JSON.parse(process.env.JUP_PRIVATE_KEY.trim());
            process.stdout.write(bs58.encode(Buffer.from(keyData)));
          ")
          echo "$BASE58_KEY" | jup keys add default --stdin
          jup keys list

      - name: Run trading agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COLLATERAL_USDC: ${{ vars.COLLATERAL_USDC }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: npm run trade
