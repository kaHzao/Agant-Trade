name: Perps Trading Agent

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Jupiter CLI
        run: npm install -g @jup-ag/cli

      - name: Setup wallet key
        env:
          JUP_PRIVATE_KEY: ${{ secrets.JUP_PRIVATE_KEY }}
        run: |
          # Find where jup stores keys on Linux
          mkdir -p ~/.config/jup/keys

          # Write key as default.json (correct filename)
          node -e "
            const key = process.env.JUP_PRIVATE_KEY.trim();
            require('fs').writeFileSync(process.env.HOME + '/.config/jup/keys/default.json', key);
            console.log('Key written to default.json');
          "

          # Write settings.json to set active key
          node -e "
            const settings = { activeKey: 'default' };
            require('fs').writeFileSync(process.env.HOME + '/.config/jup/settings.json', JSON.stringify(settings));
            console.log('Settings written');
          "

          jup keys list

      - name: Run trading agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COLLATERAL_USDC: ${{ vars.COLLATERAL_USDC }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: npm run trade
